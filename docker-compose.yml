services:
  db:
    image: postgres:16
    container_name: postgres-db-api-default
    environment:
      POSTGRES_DB: meu_projeto
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha_forte
    ports:
      - "5432:5432"
    networks:
      - api-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  api-network:
    external: true